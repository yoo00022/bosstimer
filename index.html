
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>帝王木重生計時器 - 浣力專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        morandi: {
                            bg: 'var(--morandi-bg)',
                            card: 'var(--morandi-card)',
                            text: 'var(--morandi-text)',
                            muted: 'var(--morandi-muted)',
                            accent: 'var(--morandi-accent)',
                            secondary: 'var(--morandi-secondary)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --morandi-bg: #F2F2F0;
            --morandi-card: #FFFFFF;
            --morandi-text: #4A4A4A;
            --morandi-muted: #8FA6AC;
            --morandi-accent: #B48A8A;
            --morandi-secondary: #D1C7BD;
        }
        
        .dark {
            --morandi-bg: #121212;
            --morandi-card: #1E1E1E;
            --morandi-text: #E5E5E5;
            --morandi-muted: #A3B8BC;
            --morandi-accent: #C49A9A;
            --morandi-secondary: #333333;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--morandi-bg);
            color: var(--morandi-text);
            font-size: 16px;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        @media (min-width: 1024px) {
            body { font-size: 18px; }
        }
        .morandi-panel {
            background: var(--morandi-card);
            border: 2px solid rgba(209, 199, 189, 0.4);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .dark .morandi-panel {
            border-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .font-mono-bold {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--morandi-secondary); border-radius: 10px; }
        
        .responsive-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root" class="responsive-container"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
